function formatZeit(sekunden){


  let min = Math.floor(sekunden / 60);
  let sec = sekunden % 60;

  // führende Null für Sekunden
  if(sec < 10) sec = "0" + sec;

  return min + ":" + sec;
}

function updateTimerBar(){

}
function speak(text){
  speechSynthesis.cancel(); // 🔥 stoppt alten Sound

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "es-ES";
  speechSynthesis.speak(utter);
}


function startTimer(){ 
  if(isPaused) return;

  clearInterval(timerID);

  timerID=setInterval(()=>{
zeit = Math.max(0, zeit - 0.1);

if(zeit <= 0){      clearInterval(timerID);

  },100);
}

  try {

    const current = Math.min(aktuelleFrage + 1, total);

    const pr = (current / total) * 100;
    bar.style.width = pr + "%";

    if(wiederholModus){
      el.innerText = "🔁 Fehler: " + current + " / " + total;
    } else {
      el.innerText = "📚 " + current + " / " + total;
    }

  } catch(err){
    console.error("💥 Progress Fehler:", err);
  }
}

// --- Antwort prüfen ---
function checkAntwort(eingabe, richtigListe){

  if(isPaused) return;

  clearInterval(timerID);

  if(richtigListe.includes(eingabe)){
    richtigAntwort();
  } else {
    falschAntwort(richtigListe.join(" / "));
  }
}

function checkTextAntwort(){

  if(isPaused) return;

  clearInterval(timerID);

  const input = document.getElementById("textAntwort");
  let eingabe = input.value.trim().toLowerCase();

  input.value = "";

  if(!eingabe) return;

  let korrektListe = aktuelleVokabel.deutsch.map(w => w.toLowerCase());

  if(korrektListe.includes(eingabe)){
    richtigAntwort();
  } else {
    falschAntwort(aktuelleVokabel.deutsch.join(" / "));
  }
}

function richtigAntwort(){
if(spielModus === "learn"){
  aktuelleVokabel.box = Math.min(5, aktuelleVokabel.box + 1);

  let delay = [0, 5, 20, 60, 300, 900];

  aktuelleVokabel.next = Date.now() + delay[aktuelleVokabel.box]*1000;

  saveLearningData();
  updateDailyProgress(); // kommt gleich
}
falschListe = falschListe.filter(v => 
  v.spanisch.join() !== aktuelleVokabel.spanisch.join()
);

  let bonus = 0;

  if(zeit > 7) bonus = 3;
  else if(zeit > 4) bonus = 2;
  else if(zeit > 2) bonus = 1;

  combo++;
  updateComboAnzeige();

  let comboBonus = Math.floor(combo / 3);

  let megaMode = combo >= 10;

  let gesamt = 1 + bonus + comboBonus;

  if(megaMode){
    gesamt += 5; // 💥 Extra Punkte erst ab 10
  }

  punkte += gesamt;

  document.getElementById("punkte").innerText = punkte;

  let text = `Richtig! 🎉 +${gesamt} (⚡${bonus} 🔥${comboBonus})`;

  if(megaMode){
    text += " 💥 MEGA MODE!!!";
  }

  document.getElementById("feedback").innerText = text;



// 🌋 SHAKE nur im Mega Mode
if(megaMode){
  const game = document.getElementById("gameArea");

  game.classList.add("shake");
  game.classList.add("flash");

  setTimeout(()=>{
    game.classList.remove("shake");
    game.classList.remove("flash");
  },400);
}


  nächsteFrage();
}



function getModeIcon(){
  if(spielModus === "learn") return "💡";
  if(spielModus === "multiple") return "🎯";
  if(spielModus === "typing") return "⌨️";
}

}

if(!falschListe.some(v =>

)){

    deutsch: [...aktuelleVokabel.deutsch]
  });
}


// 👉 NEU: falsche Antwort speichern


combo = 0;
updateComboAnzeige();
  leben--; 

// 👉 NEU: nur einmal speichern
if(!falschDetails.some(f => f.frage === aktuelleVokabel.spanisch.join(" / "))){

}
updateLebenAnzeige(); 
  const popup=document.getElementById("timeOverPopup");

popup.innerHTML=`
<div class="error-icon">✖</div>
<span class="correct-answer-highlight">${richtig}</span>
`;

popup.className = "";
popup.classList.add("popup-error");
popup.style.display="block";


playSound("falsch");



  setTimeout(()=>{
    document.getElementById("overlay").style.display="none"; popup.style.display="none";
if(leben <= 0){

} else {

}

function nächsteFrage(){

  if(spielModus !== "learn"){
    aktuelleFrage++;
  }

}


function konfettiAusRüssel(){

  const elefant = document.getElementById("jubelElefant");
  const rect = elefant.getBoundingClientRect();

const startX = rect.left + 60; // andere Seite wegen Spiegelung
  const startY = rect.top + 80;

  for(let i = 0; i < 40; i++){

    let k = document.createElement("div");

    k.style.position = "fixed";
    k.style.left = startX + "px";
    k.style.top = startY + "px";

    k.style.width = "8px";


    k.style.height = "8px";
    k.style.background = `hsl(${Math.random()*360},100%,50%)`;
    k.style.borderRadius = "50%";
    k.style.zIndex = "10001";

    document.body.appendChild(k);

let x = (Math.random() - 0.5) * 200;
    let y = Math.random() * 300;

    k.animate([
      { transform: "translate(0,0)", opacity: 1 },
      { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
    ], {
      duration: 1200 + Math.random()*500,
      easing: "ease-out"
    });

    setTimeout(()=>k.remove(),1500);
  }
}

function loadDaily(){
  const data = JSON.parse(localStorage.getItem("dailyStats") || "{}");

  dailyDone = data.done || 0;
  streak = data.streak || 0;

  let today = new Date().toDateString();

if(data.date !== today){

  // 👉 neuer Tag → reset oder Streak verlieren
  if(data.date){
    streak = 0;
  }

  dailyDone = 0;

  localStorage.setItem("dailyStats", JSON.stringify({
    done: dailyDone,
    streak: streak,
    date: today
  }));
}
}

function saveDaily(){
  localStorage.setItem("dailyStats", JSON.stringify({
    done: dailyDone,
    streak: streak,
    date: new Date().toDateString()
  }));
}

function updateDailyProgress(){

  dailyDone++;

  // 👉 NEU: sofort Streak erhöhen
  if(dailyDone === dailyGoal){
    streak++;

    document.getElementById("feedback").innerText =
      "🔥 Streak +1! (" + streak + ")";
  }

  saveDaily();
  updateDailyUI();
}

function updateDailyUI(){
  const el = document.getElementById("dailyBox");
  if(el){
    el.innerText = "🎯 " + dailyDone + " / " + dailyGoal + " | 🔥 " + streak;
  }
}
function ankiAnswer(type){

  if(isPaused) return;

  clearInterval(timerID);

  let delay = [0, 5, 20, 60, 300, 900];

  // ❌ Wiederholen
  if(type === "again"){
    aktuelleVokabel.box = 1;
    aktuelleVokabel.next = Date.now() + 2000;
    combo = 0;
  }

  // 😬 Schwer
  else if(type === "hard"){
    aktuelleVokabel.box = Math.max(1, aktuelleVokabel.box);
    aktuelleVokabel.next = Date.now() + delay[aktuelleVokabel.box] * 500;
  }

  // 🙂 Gut (Standard)
  else if(type === "good"){
    aktuelleVokabel.box = Math.min(5, aktuelleVokabel.box + 1);
    aktuelleVokabel.next = Date.now() + delay[aktuelleVokabel.box] * 1000;
    combo++;
  }

  // 🚀 Easy (Skip-Level)
  else if(type === "easy"){
    aktuelleVokabel.box = Math.min(5, aktuelleVokabel.box + 2);
    aktuelleVokabel.next = Date.now() + delay[aktuelleVokabel.box] * 1500;
    combo += 2;
  }

  updateComboAnzeige();
  saveLearningData();
  updateDailyProgress();

  // kleines Feedback
  document.getElementById("feedback").innerText = "🧠 gespeichert";

  setTimeout(()=>{
    nächsteFrage();
  }, 200);
}

function highlightErrors(lines, errorLines){

  const layer = document.getElementById("highlightLayer");

  let html = "";

  lines.forEach((line, index) => {

    if(errorLines.includes(index)){
      html += `<span class="error-line">${line || " "}</span>\n`;
    } else {
      html += line + "\n";
    }

  });

  layer.innerHTML = html;
}

  // 👉 rechts neben Box
const x = Math.min(rect.right + 20, window.innerWidth - 220);

window.addEventListener("load", () => {

  if(data){
    vokabeln = JSON.parse(data);

document.getElementById("saveCustomBtn").onclick = function(){

  const input = document.getElementById("customVocabInput").value.trim();

  if(!input){
    alert("Bitte Vokabeln eingeben!");
    return;
  }

  const lines = input.split("\n");

  let customList = [];
let errors = [];
let errorLines = []; // 👈 NEU
lines.forEach((line, index) => {

  line = line.trim();
  if(!line) return;

  let spanischListe = [];
  let deutschListe = [];

  // 👉 FALL 1: MIT Bindestrich
  if(line.includes("-")){

    let parts = line.split(/\s*-\s*/);

    if(parts.length < 2){
      errors.push(`Zeile ${index+1}: Trennung mit "-" fehlerhaft`);
errorLines.push(index); // 👈 NEU
      return;
    }

    spanischListe = parts[0].split("/").map(w => w.trim()).filter(w => w);
    deutschListe = parts[1].split("/").map(w => w.trim()).filter(w => w);

  }

  // 👉 FALL 2: OHNE Bindestrich
  else {

    let parts = line.split(/\s+/);

if(parts.length < 2){
  errors.push(`Zeile ${index+1}: Kein deutsches Wort gefunden`);
  errorLines.push(index);
  return;
}

    let spanischRaw = parts.shift();
    let deutschRaw = parts.join(" ");

    spanischListe = spanischRaw.split("/").map(w => w.trim()).filter(w => w);
    deutschListe = deutschRaw.split("/").map(w => w.trim()).filter(w => w);
  }

  // 👉 EXTRA CHECK
  if(spanischListe.length === 0 || deutschListe.length === 0){
    errors.push(`Zeile ${index+1}: Leere Vokabel`);
errorLines.push(index); // 👈 NEU
    return;
  }

  customList.push({
    spanisch: spanischListe,
    deutsch: deutschListe,
  });

});
highlightErrors(lines, errorLines);
// 👇 GENAU HIER EINFÜGEN
if(errors.length > 0){
  alert("❌ Fehler gefunden:\n\n" + errors.join("\n"));
  return;
}

if(customList.length === 0){
  alert("❌ Keine gültigen Vokabeln gefunden!");
  return;
}


  // 💾 speichern
  localStorage.setItem("customVocab", JSON.stringify(customList));

  // 🔥 NEU: direkt aktivieren
  vokabeln = customList;

  // 🔥 optional: Titel ändern
  document.getElementById("gameTitle").innerText = "📚 Eigene Vokabeln aktiv";

  alert("✅ Vokabeln gespeichert & aktiviert!");
};
